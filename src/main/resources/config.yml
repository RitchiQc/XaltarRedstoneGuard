# ============================================================
# Limitation des clocks redstone (tous types de blocs)
# ============================================================

# Seuil en ticks de jeu (1 redstone tick = 2 game ticks)
# Si un bloc redstone pulse plus vite que ce seuil, il est considéré comme un clock.
threshold-ticks: 4

# Active la limitation des clocks redstone (remplace l'ancien limit-observer)
limit-redstone: true

# Liste des blocs redstone à surveiller
# Approche universelle : tous les blocs dans cette liste seront rate-limités.
# Si la liste est vide, une liste par défaut est utilisée.
limited-materials:
  - OBSERVER
  - COMPARATOR
  - REPEATER
  - REDSTONE_TORCH
  - REDSTONE_WALL_TORCH
  - PISTON
  - STICKY_PISTON
  - HOPPER
  - DROPPER
  - DISPENSER
  - DAYLIGHT_DETECTOR
  - LECTERN
  - TRIPWIRE_HOOK
  - TARGET

# Throttle le bloc pour le limiter au tick configuré (plus permissif que cancel)
# Si activé, le bloc peut pulser exactement tous les "threshold-ticks" ticks.
# Si désactivé, la logique "cancel-signal" s'applique.
throttle: true

# Annule le signal redstone si la limite est dépassée (coupe l'output)
cancel-signal: false

# Supprime complètement le bloc si la limite est dépassée (sans drop d'item)
break-block: false

# Intervalle de nettoyage de la mémoire en minutes
# Supprime les entrées obsolètes pour éviter les fuites mémoire
cleanup-interval-minutes: 5

# ============================================================
# Configuration de la commande /xalguard limit
# ============================================================
command:
  limit:
    # Délai en secondes entre chaque utilisation de /xalguard limit par joueur
    cooldown-seconds: 30
    # Permission requise pour utiliser /xalguard limit
    permission: "xalguard.limit"
    # Permission pour bypass le cooldown (généralement pour le staff)
    bypass-permission: "xalguard.limit.bypass"

# ============================================================
# Limitation du nombre de blocs par chunk
# ============================================================
block-limits:
  # Active la limitation des blocs par chunk
  enabled: true

  # Limite maximum de Crafters par chunk
  crafter: 400

  # Limite maximum de Dispensers par chunk
  dispenser: 400

  # Limite maximum de Droppers par chunk
  dropper: 400

  # Limite maximum de Repeaters par chunk
  repeater: 1000

  # Limite maximum de Hopper par chunk
  hopper: 3500

  # Limite maximum de Comparator par chunk
  comparator: 400

  # Message affiché au joueur lorsque la limite est atteinte
  # Placeholders: %type% = nom du bloc, %limit% = limite configurée
  # Supporte les couleurs MiniMessage (<red>, <yellow>, <green>, etc.)
  message: "<red>Limite de <yellow>%type%</yellow> atteinte dans ce chunk (<yellow>%limit%</yellow> blocs)."

# ============================================================
# Limitation du nombre d'items au sol par chunk
# ============================================================
item-limits:
  # Active la limitation des items par chunk
  enabled: true

  # Nombre maximum d'entités items au sol par chunk
  # Lorsque cette limite est dépassée, l'item le plus ancien est supprimé
  max-items-per-chunk: 3000
